<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StreamSelector | Secure Access</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  
  <style>
    /* --- RESET & BASE --- */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html { width: 100%; height: 100%; overflow: hidden; background-color: #030712; font-family: 'Inter', sans-serif; color: #f3f4f6; }
    
    /* --- INTERACTIVE CANVAS BACKGROUND --- */
    #canvas-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: auto; }

    /* --- LAYOUT --- */
    .container { position: relative; z-index: 10; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; perspective: 1200px; pointer-events: none; }

    /* --- ANTIGRAVITY WRAPPER --- */
    .float-wrapper { animation: float 6s ease-in-out infinite; pointer-events: auto; }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-20px); }
    }

    /* --- 3D TILT WRAPPER --- */
    .tilt-wrapper { transition: transform 0.1s ease-out; transform-style: preserve-3d; }

    /* --- GLASSMORPHISM LOGIN CARD --- */
    .login-card {
      background: rgba(17, 24, 39, 0.65);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-top: 1px solid rgba(255, 255, 255, 0.2);
      border-left: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 24px;
      padding: 40px 35px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), inset 0 0 20px rgba(56, 189, 248, 0.05);
    }

    .brand { font-family: 'Space Grotesk', sans-serif; font-size: 2rem; font-weight: 700; text-align: center; margin-bottom: 5px; background: linear-gradient(to right, #38bdf8, #818cf8); -webkit-background-clip: text; color: transparent; }
    .subtitle { text-align: center; font-size: 0.9rem; color: #9ca3af; margin-bottom: 30px; }

    /* --- INPUT FIELDS --- */
    .input-group { position: relative; margin-bottom: 25px; }
    
    /* FIX APPLIED HERE: padding-right changed to 95px */
    .input-group input { width: 100%; padding: 15px 95px 15px 45px; background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; color: #fff; font-size: 1rem; outline: none; transition: all 0.3s; }
    .input-group input:focus { border-color: #38bdf8; box-shadow: 0 0 15px rgba(56, 189, 248, 0.2); background: rgba(0, 0, 0, 0.5); }
    
    /* Icons inside inputs */
    .icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); width: 20px; height: 20px; fill: #9ca3af; transition: 0.3s; pointer-events: none; }
    .input-group input:focus + .icon { fill: #38bdf8; }

    /* --- Send OTP Interactive Text (FIX APPLIED HERE) --- */
    .send-otp-btn {
      position: absolute; right: 15px; top: 50%; transform: translateY(-50%);
      color: #38bdf8; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: 0.3s;
      white-space: nowrap; /* Prevents text from dropping to a new line */
      user-select: none; /* Prevents accidentally highlighting the text */
    }
    .send-otp-btn:hover { text-shadow: 0 0 8px rgba(56, 189, 248, 0.8); color: #fff; }

    /* --- BUTTON --- */
    .btn { width: 100%; padding: 15px; background: linear-gradient(135deg, #0284c7, #4f46e5); color: #fff; border: none; border-radius: 12px; font-family: 'Space Grotesk', sans-serif; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: all 0.3s; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 10px 25px rgba(79, 70, 229, 0.4); position: relative; overflow: hidden; }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 15px 35px rgba(79, 70, 229, 0.6); }

    .links { display: flex; justify-content: center; margin-top: 20px; font-size: 0.85rem; }
    .links a { color: #9ca3af; text-decoration: none; transition: 0.3s; }
    .links a:hover { color: #38bdf8; text-shadow: 0 0 8px rgba(56, 189, 248, 0.5); }
  </style>
</head>
<body>

  <canvas id="canvas-bg"></canvas>

  <div class="container">
    <div class="float-wrapper">
      <div class="tilt-wrapper" id="tilt-card">
        <div class="login-card">
          <h1 class="brand">StreamSelector</h1>
          <p class="subtitle">Secure Professional Terminal</p>
          
          <form onsubmit="handleLogin(event)">
            
            <div class="input-group">
              <input type="email" id="emailInput" placeholder="Email Address" required autocomplete="email">
              <svg class="icon" viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
              <span class="send-otp-btn" id="sendOtpBtn" onclick="triggerOTP()">Send OTP</span>
            </div>
            
            <div class="input-group">
              <input type="text" id="otpInput" placeholder="Enter OTP" pattern="[0-9]{4,6}" title="Enter 4 to 6 digit OTP" required autocomplete="one-time-code">
              <svg class="icon" viewBox="0 0 24 24"><path d="M12.65 10C11.83 7.67 9.61 6 7 6c-3.31 0-6 2.69-6 6s2.69 6 6 6c2.61 0 4.83-1.67 5.65-4H14v4h4v-4h3v-4h-8.35zM7 14c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z"/></svg>
            </div>

            <button type="submit" class="btn" id="loginBtn">Initialize Login</button>
          </form>

          <div class="links">
            <a href="#">Need help accessing your account?</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // --- 1. REAL API INTEGRATION LOGIC ---
    
    async function triggerOTP() {
      const emailInput = document.getElementById('emailInput').value;
      const otpBtn = document.getElementById('sendOtpBtn');
      const otpInput = document.getElementById('otpInput');

      // Basic validation
      if (!emailInput || !emailInput.includes('@')) {
        alert("Please enter a valid email address first.");
        return;
      }

      // UI Loading state
      otpBtn.innerText = "Sending...";
      otpBtn.style.pointerEvents = "none";

      try {
        // Send request to your Node.js backend
        const response = await fetch('http://localhost:3000/api/send-otp', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: emailInput })
        });

        const data = await response.json();

        if (data.success) {
          // Success state
          otpBtn.innerText = "Sent ✓";
          otpBtn.style.color = "#10b981"; // Success Green
          otpInput.focus();
        } else {
          // Backend returned an error (e.g., missing email)
          otpBtn.innerText = "Failed";
          otpBtn.style.color = "#ef4444"; // Error Red
          otpBtn.style.pointerEvents = "auto";
          alert("Error: " + data.message);
        }
      } catch (error) {
        console.error("Fetch error:", error);
        otpBtn.innerText = "Send OTP";
        otpBtn.style.pointerEvents = "auto";
        alert("Could not connect to the backend server. Make sure your Node.js server is running on port 3000.");
      }
    }

    async function handleLogin(e) {
      e.preventDefault(); 
      
      const emailInput = document.getElementById('emailInput').value;
      const otpInput = document.getElementById('otpInput').value;
      const btn = document.getElementById('loginBtn');
      
      // Loading state
      btn.innerText = "Verifying Link...";
      btn.style.opacity = "0.8";
      btn.style.cursor = "wait";

      try {
        // Send verification request to backend
        const response = await fetch('http://localhost:3000/api/verify-otp', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: emailInput, otp: otpInput })
        });

        const data = await response.json();

        if (data.success) {
          // Success: OTP is correct!
          btn.innerText = "Access Granted 🚀";
          btn.style.background = "linear-gradient(135deg, #10b981, #059669)"; // Green gradient
          btn.style.boxShadow = "0 10px 25px rgba(16, 185, 129, 0.4)";
          
          // Redirect to index.html
          setTimeout(() => {
            window.location.href = 'index.html';
          }, 600);
        } else {
          // Failure: Wrong OTP or expired
          btn.innerText = "Initialize Login";
          btn.style.opacity = "1";
          btn.style.cursor = "pointer";
          alert(data.message || "Invalid OTP. Please try again.");
        }
      } catch (error) {
        console.error("Fetch error:", error);
        btn.innerText = "Initialize Login";
        btn.style.opacity = "1";
        btn.style.cursor = "pointer";
        alert("Could not connect to server. Is the backend running?");
      }
    }


    // --- 2. 3D CARD TILT LOGIC ---
    const tiltCard = document.getElementById('tilt-card');
    document.addEventListener('mousemove', (e) => {
      if (window.innerWidth < 768) return; 
      const xAxis = (window.innerWidth / 2 - e.pageX) / 25;
      const yAxis = (window.innerHeight / 2 - e.pageY) / 25;
      tiltCard.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
    });
    
    document.addEventListener('mouseleave', () => {
      tiltCard.style.transform = `rotateY(0deg) rotateX(0deg)`;
    });


    // --- 3. POWERFUL PARTICLE NETWORK ENGINE ---
    const canvas = document.getElementById('canvas-bg');
    const ctx = canvas.getContext('2d');
    
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let particlesArray = [];
    const numberOfParticles = (canvas.width * canvas.height) / 12000;

    let mouse = { x: null, y: null, radius: 150 }

    window.addEventListener('mousemove', function(event) {
      mouse.x = event.x;
      mouse.y = event.y;
    });

    window.addEventListener('mouseout', function() {
      mouse.x = undefined;
      mouse.y = undefined;
    });

    class Particle {
      constructor(x, y, directionX, directionY, size, color) {
        this.x = x; this.y = y;
        this.directionX = directionX; this.directionY = directionY;
        this.size = size; this.color = color;
      }
      
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
        ctx.fillStyle = this.color;
        ctx.fill();
      }

      update() {
        if (this.x > canvas.width || this.x < 0) this.directionX = -this.directionX;
        if (this.y > canvas.height || this.y < 0) this.directionY = -this.directionY;

        let dx = mouse.x - this.x;
        let dy = mouse.y - this.y;
        let distance = Math.sqrt(dx * dx + dy * dy);
        if (distance < mouse.radius + this.size) {
          if (mouse.x < this.x && this.x < canvas.width - this.size * 10) this.x += 2;
          if (mouse.x > this.x && this.x > this.size * 10) this.x -= 2;
          if (mouse.y < this.y && this.y < canvas.height - this.size * 10) this.y += 2;
          if (mouse.y > this.y && this.y > this.size * 10) this.y -= 2;
        }

        this.x += this.directionX;
        this.y += this.directionY;
        this.draw();
      }
    }

    function init() {
      particlesArray = [];
      for (let i = 0; i < numberOfParticles; i++) {
        let size = (Math.random() * 2) + 1;
        let x = (Math.random() * ((canvas.width - size * 2) - (size * 2)) + size * 2);
        let y = (Math.random() * ((canvas.height - size * 2) - (size * 2)) + size * 2);
        let directionX = (Math.random() * 1) - 0.5;
        let directionY = (Math.random() * 1) - 0.5;
        let color = '#38bdf8'; 
        particlesArray.push(new Particle(x, y, directionX, directionY, size, color));
      }
    }

    function connect() {
      let opacityValue = 1;
      for (let a = 0; a < particlesArray.length; a++) {
        for (let b = a; b < particlesArray.length; b++) {
          let distance = ((particlesArray[a].x - particlesArray[b].x) * (particlesArray[a].x - particlesArray[b].x)) + 
                         ((particlesArray[a].y - particlesArray[b].y) * (particlesArray[a].y - particlesArray[b].y));
          
          if (distance < (canvas.width / 10) * (canvas.height / 10)) {
            opacityValue = 1 - (distance / 20000);
            ctx.strokeStyle = `rgba(129, 140, 248, ${opacityValue})`; 
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
            ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
            ctx.stroke();
          }
        }
      }
    }

    function animate() {
      requestAnimationFrame(animate);
      ctx.clearRect(0, 0, innerWidth, innerHeight);
      for (let i = 0; i < particlesArray.length; i++) {
        particlesArray[i].update();
      }
      connect();
    }

    window.addEventListener('resize', function() {
      canvas.width = innerWidth;
      canvas.height = innerHeight;
      init();
    });

    init();
    animate();
  </script>
</body>
</html>
